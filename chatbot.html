<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werkstatt Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --red: #E8270A; --dark: #0f0f0f; --dark2: #1a1a1a; --dark3: #242424; --steel: #2e2e2e; --light: #f5f0eb; --muted: #888; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--light); font-family: 'Barlow', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .chat-container { width: 100%; max-width: 480px; height: 90vh; background: var(--dark2); border: 1px solid var(--steel); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { background: var(--red); padding: 18px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
  .dot { width: 9px; height: 9px; background: #7fff7f; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 11px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot { background: var(--dark3); border: 1px solid var(--steel); align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.user { background: var(--red); align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.typing { background: var(--dark3); border: 1px solid var(--steel); align-self: flex-start; padding: 13px 16px; }
  .dots { display: flex; gap: 5px; }
  .dots span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: dot 1.2s infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .chat-input-area { padding: 14px; border-top: 1px solid var(--steel); display: flex; gap: 10px; }
  .chat-input { flex: 1; background: var(--dark3); border: 1px solid var(--steel); color: var(--light); font-family: 'Barlow', sans-serif; font-size: 15px; padding: 11px 14px; border-radius: 8px; outline: none; transition: border-color 0.2s; }
  .chat-input:focus { border-color: var(--red); }
  .chat-input::placeholder { color: #555; }
  .send-btn { background: var(--red); border: none; color: white; width: 44px; height: 44px; border-radius: 8px; cursor: pointer; font-size: 18px; transition: background 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: #c9200a; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header"><div class="dot"></div>Werkstatt Assistent</div>
  <div class="chat-messages" id="msgs">
    <div class="msg bot">Hallo! 👋 Ich bin der Werkstatt-Assistent. Ich helfe Ihnen bei Fragen zu Reifenwechsel, Ölwechsel und Terminen. Was kann ich für Sie tun?</div>
  </div>
  <div class="chat-input-area">
    <input class="chat-input" id="input" type="text" placeholder="Ihre Frage eingeben..." onkeydown="if(event.key==='Enter')send()">
    <button class="send-btn" onclick="send()">➤</button>
  </div>
</div>
<script>
  const API_KEY = "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";
  const history = [];
  function addMsg(text, role) {
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function showTyping() {
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'msg typing'; d.id = 'typing';
    d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }
  async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg(text, 'user');
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 500, system: 'Du bist ein freundlicher Assistent einer Kfz-Werkstatt. Du hilfst bei Reifenwechsel (45 Min.), Ölwechsel (30 Min.), Öffnungszeiten (Mo-Fr 08-18, Sa 08-13) und Terminbuchungen. Antworte kurz auf Deutsch.', messages: history })
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMsg(reply, 'bot');
    } catch(e) {
      document.getElementById('typing')?.remove();
      addMsg('Fehler – bitte erneut versuchen.', 'bot');
    }
  }
</script>
</body>
</html>
